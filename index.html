<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* =================================================================
   HOOKS
================================================================= */
function useParallax(speed = 0.12) {
  const [y, setY] = useState(0);
  useEffect(() => {
    let ticking = false;
    const onScroll = () => {
      if (!ticking) {
        window.requestAnimationFrame(() => {
          setY(window.scrollY * speed);
          ticking = false;
        });
        ticking = true;
      }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [speed]);
  return y;
}

function useScrolled(threshold = 20) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > threshold);
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [threshold]);
  return scrolled;
}

/* =================================================================
   FADE IN
================================================================= */
function FadeIn({ children, delay = 0, duration = 900, className = '', style = {} }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setShow(true), delay);
    return () => clearTimeout(t);
  }, [delay]);
  return (
    <div
      className={className}
      style={{
        opacity: show ? 1 : 0,
        transform: show ? 'translateY(0)' : 'translateY(12px)',
        transition: `opacity ${duration}ms cubic-bezier(0.16, 1, 0.3, 1), transform ${duration}ms cubic-bezier(0.16, 1, 0.3, 1)`,
        ...style,
      }}
    >
      {children}
    </div>
  );
}

/* =================================================================
   ANIMATED HEADING (char-by-char, word-safe)
================================================================= */
function AnimatedHeading({ as: Tag = 'h1', text, className = '', style = {}, highlight = [] }) {
  const [show, setShow] = useState(false);
  useEffect(() => {
    const t = setTimeout(() => setShow(true), 50);
    return () => clearTimeout(t);
  }, []);
  const charDelay = 30;
  const lines = text.split('\n');
  return (
    <Tag className={className} style={style}>
      {lines.map((line, li) => {
        const words = line.split(' ');
        let charIdx = 0;
        return (
          <span key={li} style={{ display: 'block' }}>
            {words.map((w, wi) => {
              const clean = w.replace(/[.,!?]/g, '').toLowerCase();
              const isHl = highlight.some(h => clean.includes(h.toLowerCase()));
              const isLast = wi === words.length - 1;
              return (
                <React.Fragment key={wi}>
                  <span className="ah-word">
                    {w.split('').map((ch, ci) => {
                      const delay = (li * 700) + (charIdx++ * charDelay) + 200;
                      return (
                        <span
                          key={ci}
                          className={'ah-char' + (show ? ' in' : '')}
                          style={{
                            transitionDelay: `${delay}ms`,
                            color: isHl ? '#fff' : undefined,
                          }}
                        >
                          {ch}
                        </span>
                      );
                    })}
                  </span>
                  {!isLast && (
                    <span
                      className={'ah-char' + (show ? ' in' : '')}
                      style={{
                        transitionDelay: `${(li * 700) + (charIdx++ * charDelay) + 200}ms`,
                        whiteSpace: 'pre',
                      }}
                    >
                      {' '}
                    </span>
                  )}
                </React.Fragment>
              );
            })}
          </span>
        );
      })}
    </Tag>
  );
}

/* =================================================================
   BLUR TEXT (word-by-word)
================================================================= */
function BlurText({ text, className = '', style = {}, highlight = [] }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            setVisible(true);
            io.disconnect();
          }
        });
      },
      { threshold: 0.1 }
    );
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  const lines = text.split('\n');
  let globalIdx = 0;
  return (
    <div
      ref={ref}
      className={className}
      style={{ display: 'block', ...style }}
    >
      {lines.map((line, li) => (
        <div key={li} style={{ display: 'flex', flexWrap: 'wrap', rowGap: '0.1em' }}>
          {line.split(' ').map((w, wi) => {
            const idx = globalIdx++;
            const clean = w.replace(/[.,!?]/g, '').toLowerCase();
            const isHl = highlight.some((h) => clean.includes(h.toLowerCase()));
            return (
              <span
                key={wi}
                className={'bt-word' + (visible ? ' in' : '')}
                style={{
                  transitionDelay: `${idx * 100}ms`,
                  color: isHl ? 'var(--brand-primary)' : undefined,
                }}
              >
                {w}
              </span>
            );
          })}
        </div>
      ))}
    </div>
  );
}

          <div className="flex items-center justify-center gap-6 mt-12">
            <button
              onClick={() => go(idx - 1)}

              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
              aria-label="Anterior"
            >
              <Icon.ChevronLeft />
            </button>
            <div className="flex items-center gap-2">
              {DEPOIMENTOS.map((_, i) => (
                <button
                  key={i}
                  onClick={() => go(i)}
                  className="rounded-full transition-all duration-300"
                  style={{
                    width: i === idx ? 24 : 8,
                    height: 8,
                    background: i === idx ? 'var(--brand-deep)' : 'rgba(15,42,95,0.2)',

                  aria-label={`Depoimento ${i + 1}`}

              ))}
            </div>
            <button
              onClick={() => go(idx + 1)}
              className="w-11 h-11 rounded-full inline-flex items-center justify-center transition-colors duration-200"
              style={{ color: 'var(--brand-deep)', border: '1px solid rgba(15,42,95,0.15)' }}
              onMouseEnter={(e) => e.currentTarget.style.background = 'rgba(15,42,95,0.05)'}
              onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
              aria-label="Próximo"
            >
              <Icon.ChevronRight />
            </button>
          </div>
        </div>
      </div>
    </section>
